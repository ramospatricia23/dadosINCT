<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Conversor DarwinCore - SiBBr</title>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
<h2>Converter planilha para padrão SiBBr</h2>

<input type="file" id="fileInput"
accept=".xlsx,.xls,.csv">

<button onclick="processar()">Converter</button>

<script>
function processar() {

  const file = document.getElementById('fileInput').files[0];
  const reader = new FileReader();

  reader.onload = function(e) {

    const data = new Uint8Array(e.target.result);

    // SheetJS detecta automaticamente o formato
    const workbook = XLSX.read(data, {type: "array"});

    const sheetName = workbook.SheetNames[0];
    const json = XLSX.utils.sheet_to_json(
        workbook.Sheets[sheetName]
    );

    console.log("Dados lidos:", json);

    // 👉 aqui entra sua lógica DarwinCore
    const occurrence = [];

    json.forEach(row => {
        occurrence.push({
            occurrenceID: row.id_ocorrencia,
            eventID: row.id_evento,
            measurementType: "pH",
            measurementValue: row.pH
        });
    });

    // cria nova planilha
    const ws = XLSX.utils.json_to_sheet(occurrence);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "occurrence");

    XLSX.writeFile(wb, "dados_SIBBR.xlsx");
  };

  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
